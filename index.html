<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undercover Manga</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- OPTIMISATIONS DE FLUIDITÉ --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #080508 url('https://i.imgur.com/EMJ4VFL.jpeg') center/cover no-repeat fixed;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .uc-btn {
            background: linear-gradient(135deg, #8b0000 0%, #4a0000 100%);
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s ease-out;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            touch-action: manipulation;
        }
        .uc-btn:active { transform: scale(0.96); filter: brightness(1.2); }

        .vote-btn {
            background: rgba(139, 0, 0, 0.2);
            border: 1px solid #8b0000;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.1s;
            touch-action: manipulation;
        }
        .vote-btn:active { background: #8b0000; transform: scale(0.95); }

        /* Le reste de tes styles Manga originaux */
        #main-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 20px; transition: all 0.4s ease;
        }
        .hidden { display: none !important; }
        .manga-card {
            background: rgba(20, 15, 20, 0.95);
            border: 2px solid #8b0000;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
        }
        /* ... (tes autres styles gardés) ... */
    </style>
</head>
<body>

    <div id="game-container" class="min-h-screen p-4 max-w-md mx-auto"></div>
    <div id="main-overlay" class="hidden"></div>

    <script>
        // --- TES CLÉS MISES À JOUR ---
        const SUPA_URL = "https://tgxxjrwosegbmwqoulax.supabase.co";
        const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRneHhqcndvc2VnYm13cW91bGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzI4NTksImV4cCI6MjA5MDc0ODg1OX0.7GSSXXdAbR0sLFqW1L49gb5plp4WyEs883bUT99EYyE";
        const db = supabase.createClient(SUPA_URL, SUPA_KEY);

        // --- TA LOGIQUE ET TES DONNÉES ORIGINALES ---
        let gameState = {
            roomCode: '', players: [], me: null, status: 'LOBBY',
            currentWord: '', undercoverWord: '', votedPlayers: {},
            history: [], turnIndex: 0, timer: 0
        };

        const characters = [
            { id: 'luffy', name: 'Luffy', series: 'One Piece', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b40-S0V7pZf9nZlU.png' },
            { id: 'zoro', name: 'Zoro', series: 'One Piece', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b62-NoXmYVatB92N.png' },
            { id: 'naruto', name: 'Naruto', series: 'Naruto', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b17-7V9U6VatB92N.png' },
            { id: 'sasuke', name: 'Sasuke', series: 'Naruto', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b13-7V9U6VatB92N.png' },
            { id: 'goku', name: 'Goku', series: 'Dragon Ball', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b246-NoXmYVatB92N.png' },
            { id: 'vegeta', name: 'Vegeta', series: 'Dragon Ball', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b10-7V9U6VatB92N.png' },
            { id: 'tanjiro', name: 'Tanjiro', series: 'Demon Slayer', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b126071-7V9U6VatB92N.png' },
            { id: 'nezuko', name: 'Nezuko', series: 'Demon Slayer', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b127518-7V9U6VatB92N.png' },
            { id: 'gojo', name: 'Gojo', series: 'Jujutsu Kaisen', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b127055-7V9U6VatB92N.png' },
            { id: 'itadori', name: 'Itadori', series: 'Jujutsu Kaisen', img: 'https://s4.anilist.co/file/anilistcdn/character/large/b127054-7V9U6VatB92N.png' }
        ];

        const wordPairs = [
            ["Manga", "Anime"], ["Shonen", "Seinen"], ["Katana", "Sabre"],
            ["Hokage", "Pirate King"], ["Jutsu", "Haki"], ["Kunai", "Shuriken"],
            ["Ramen", "Onigiri"], ["Rasengan", "Chidori"], ["Saiyan", "Namek"]
        ];

        // --- FONCTIONS DE SYNCHRO (CORRIGÉES) ---
        async function sendData() {
            if (!gameState.roomCode) return;
            await db.from('uc_games').upsert({
                room_code: gameState.roomCode,
                data: JSON.parse(JSON.stringify(gameState)),
                updated_at: new Date().toISOString()
            }, { onConflict: 'room_code' });
        }

        function subscribeToRoom(code) {
            db.channel(`room:${code}`)
              .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'uc_games', filter: `room_code=eq.${code}` }, 
              payload => { if (payload.new && payload.new.data) { gameState = payload.new.data; render(); } })
              .subscribe();
        }

        // --- ACTIONS ---
        async function createRoom() {
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            gameState.roomCode = code;
            gameState.status = 'LOBBY';
            await sendData();
            subscribeToRoom(code);
            render();
        }

        async function joinRoom(code) {
            code = code.toUpperCase();
            const { data, error } = await db.from('uc_games').select('data').eq('room_code', code).single();
            if (data) {
                gameState = data.data;
                subscribeToRoom(code);
                if (!gameState.me) showCharacterSelection();
                else render();
            } else { alert("Salle introuvable !"); }
        }

        function showCharacterSelection() {
            const overlay = document.getElementById('main-overlay');
            overlay.innerHTML = `
                <div class="manga-card p-6 w-full max-w-sm rounded-xl text-center">
                    <h2 class="cinzel text-2xl font-black mb-4 text-red-600">Choisis ton Héros</h2>
                    <div class="grid grid-cols-2 gap-3 max-h-96 overflow-y-auto p-2">
                        ${characters.map(c => `
                            <div onclick="selectCharacter('${c.id}')" class="cursor-pointer group">
                                <img src="${c.img}" class="w-full h-32 object-cover rounded-lg border-2 border-transparent group-hover:border-red-600 transition">
                                <p class="text-xs mt-1 font-bold">${c.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            overlay.classList.remove('hidden');
        }

        async function selectCharacter(charId) {
            const char = characters.find(c => c.id === charId);
            const player = { id: Math.random().toString(36).substr(2,9), name: char.name, img: char.img, isEliminated: false, role: 'CIVIL' };
            gameState.me = player;
            gameState.players.push(player);
            document.getElementById('main-overlay').classList.add('hidden');
            await sendData();
            render();
        }

        async function startGame() {
            if (gameState.players.length < 3) return alert("Il faut au moins 3 joueurs !");
            const pair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
            gameState.currentWord = pair[0];
            gameState.undercoverWord = pair[1];
            
            const players = [...gameState.players];
            const undercoverIdx = Math.floor(Math.random() * players.length);
            players.forEach((p, i) => {
                p.role = (i === undercoverIdx) ? 'UNDERCOVER' : 'CIVIL';
                p.isEliminated = false;
            });
            
            gameState.players = players;
            gameState.status = 'DISCOVER';
            gameState.votedPlayers = {};
            await sendData();
            render();
        }

        function castVote(targetId) {
            if (gameState.votedPlayers[gameState.me.id]) return;
            gameState.votedPlayers[gameState.me.id] = targetId;
            render();
            sendData();
            const alive = gameState.players.filter(p => !p.isEliminated);
            if (Object.keys(gameState.votedPlayers).length >= alive.length) {
                setTimeout(processVoteResults, 1000);
            }
        }

        async function processVoteResults() {
            const counts = {};
            Object.values(gameState.votedPlayers).forEach(id => counts[id] = (counts[id] || 0) + 1);
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
            const eliminatedId = sorted[0][0];
            const p = gameState.players.find(pl => pl.id === eliminatedId);
            p.isEliminated = true;
            gameState.votedPlayers = {};
            
            const undercover = gameState.players.find(pl => pl.role === 'UNDERCOVER');
            if (undercover.isEliminated) {
                alert("L'Undercover a été démasqué ! Victoire des Civils.");
                gameState.status = 'LOBBY';
            } else if (gameState.players.filter(pl => !pl.isEliminated).length <= 2) {
                alert("L'Undercover a gagné !");
                gameState.status = 'LOBBY';
            } else {
                gameState.status = 'PLAYING';
            }
            await sendData();
            render();
        }

        // --- MOTEUR DE RENDU (TON INTERFACE) ---
        function render() {
            const container = document.getElementById('game-container');
            
            if (gameState.status === 'LOBBY') {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <h1 class="cinzel text-5xl font-black text-red-600 mb-2">UNDERCOVER</h1>
                        <p class="text-gray-400 italic mb-8">Édition Manga</p>
                        ${!gameState.roomCode ? `
                            <button onclick="createRoom()" class="uc-btn w-full mb-4">Créer une salle</button>
                            <input id="joinInput" type="text" placeholder="CODE" class="w-full bg-gray-900 border-2 border-red-900 p-4 rounded-xl text-center text-2xl mb-4">
                            <button onclick="joinRoom(document.getElementById('joinInput').value)" class="uc-btn w-full bg-gray-800">Rejoindre</button>
                        ` : `
                            <div class="manga-card p-6 rounded-xl mb-6">
                                <p class="text-sm text-gray-400">CODE DE LA SALLE</p>
                                <p class="text-4xl font-black text-white tracking-widest">${gameState.roomCode}</p>
                            </div>
                            <div class="grid grid-cols-3 gap-4 mb-8">
                                ${gameState.players.map(p => `
                                    <div class="text-center">
                                        <img src="${p.img}" class="w-16 h-16 rounded-full mx-auto border-2 border-red-600">
                                        <p class="text-xs mt-1 font-bold truncate">${p.name}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="startGame()" class="uc-btn w-full">Démarrer la partie</button>
                        `}
                    </div>
                `;
            } else if (gameState.status === 'DISCOVER') {
                const myRole = gameState.players.find(p => p.id === gameState.me.id).role;
                const myWord = (myRole === 'CIVIL') ? gameState.currentWord : gameState.undercoverWord;
                container.innerHTML = `
                    <div class="manga-card p-8 rounded-2xl text-center mt-20">
                        <h2 class="cinzel text-2xl mb-6">Ton Mot Secret</h2>
                        <div class="bg-black p-6 rounded-xl border border-red-900 mb-8">
                            <span class="text-4xl font-black text-red-600">${myWord}</span>
                        </div>
                        <button onclick="gameState.status='PLAYING'; render(); sendData();" class="uc-btn w-full">J'ai compris</button>
                    </div>
                `;
            } else {
                // Écran de jeu / Vote
                container.innerHTML = `
                    <div class="mb-6 flex justify-between items-center">
                        <h2 class="cinzel text-xl text-red-600 font-bold">Survivants</h2>
                        <span class="bg-red-900/30 px-3 py-1 rounded-full text-xs border border-red-60
